<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>烘焙成本計算</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#fdf8f2;--cream2:#f5ede0;--cream3:#ede0cc;
  --brown-dk:#3d2b1f;--brown-md:#7a4f35;--brown-lt:#b07d55;
  --amber:#d4872a;--amber-lt:#f5d49a;--amber-bg:#fef3dc;
  --green:#4a7c59;--green-bg:#eaf3ee;
  --red:#b84040;--red-bg:#fceaea;
  --blue:#2563a8;--blue-bg:#e8f0fb;
  --border:#e2d3c0;--border-md:#c9b89f;
  --text-pri:#2d1e14;--text-sec:#7a6050;--text-hint:#b09880;
  --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(61,43,31,.08);
  --shadow-md:0 4px 12px rgba(61,43,31,.12);
}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--cream);color:var(--text-pri);font-size:15px;line-height:1.6;min-height:100vh}

/* Header */
.header{background:var(--brown-dk);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-inner{max-width:960px;margin:0 auto;padding:0 1rem;display:flex;align-items:center;gap:1.5rem;height:56px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{font-size:22px}
.logo-text{font-size:16px;font-weight:600;color:var(--amber-lt);letter-spacing:.02em}
.nav{display:flex;gap:4px;flex:1}
.nav-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius-md);border:none;background:transparent;color:rgba(255,255,255,.65);font-size:14px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-btn.active{background:var(--amber);color:#fff;font-weight:500}
.nav-icon{font-size:16px}

/* Main */
.main{max-width:960px;margin:0 auto;width:100%;padding:1.5rem 1rem 3rem}
.page{display:none}.page.active{display:block}
.page-header{margin-bottom:1.25rem}
.page-header h2{font-size:20px;font-weight:600;color:var(--brown-dk)}
.page-desc{font-size:13px;color:var(--text-sec);margin-top:2px}

/* 原料頁面 sticky 表單 */
.raw-sticky{
  position:sticky;
  top:56px;
  z-index:90;
  background:var(--cream);
  padding-top:4px;
  padding-bottom:8px;
  margin-bottom:4px;
  box-shadow:0 4px 8px -4px rgba(61,43,31,.08);
}
.page-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.btn-toggle-form{
  height:36px;padding:0 16px;
  background:var(--amber);color:#fff;
  border:none;border-radius:var(--radius-sm);
  font-size:14px;font-family:inherit;font-weight:500;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:background .15s;
}
.btn-toggle-form:hover{background:var(--brown-md)}
.btn-toggle-form.active{background:var(--brown-md)}
.form-collapsible{
  overflow:hidden;
  max-height:0;
  margin-bottom:0;
  padding-top:0 !important;
  padding-bottom:0 !important;
  border-width:0 !important;
  transition:max-height .3s ease, padding .25s ease, margin .25s ease, border-width .25s ease;
}
.form-collapsible.open{
  max-height:1200px;
  margin-bottom:1.25rem;
  padding-top:1.25rem !important;
  padding-bottom:1.25rem !important;
  border-width:1px !important;
}

/* Form */
.form-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow)}
.form-title{font-size:14px;font-weight:500;color:var(--text-sec);margin-bottom:1rem}
.form-grid{display:grid;gap:10px}
.g-raw{grid-template-columns:2fr 1fr 1fr 1.2fr auto}
.g-prep{grid-template-columns:2fr 1fr}
.g-fin{grid-template-columns:2fr 1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--text-sec);font-weight:500}
.field.err input,.field.err select{border-color:var(--red)}
.err-msg{font-size:11px;color:var(--red)}
input,select{height:38px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 10px;font-size:14px;font-family:inherit;color:var(--text-pri);background:#fff;transition:border-color .15s,box-shadow .15s;width:100%}
input:focus,select:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(212,135,42,.15)}
input::placeholder{color:var(--text-hint)}
.form-section-title{font-size:12px;font-weight:500;color:var(--text-sec);margin:1rem 0 6px}
.ing-add-row{display:flex;gap:8px;align-items:center}
.ing-add-row select{flex:2}.ing-add-row input{flex:1}
.ing-section-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:4px}
.label-filter-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.lf-btn{padding:3px 10px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--cream2);color:var(--text-sec);transition:all .15s}
.lf-btn:hover{border-color:var(--border-md);color:var(--text-pri)}
.lf-btn.lf-on{border-color:currentColor;opacity:1;font-weight:600}
.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.form-actions{display:flex;gap:8px;align-items:flex-end}
.form-footer{display:flex;gap:8px;margin-top:1rem}

/* Cost preview */
.cost-preview{display:flex;align-items:center;gap:16px;background:var(--amber-bg);border:1px solid var(--amber-lt);border-radius:var(--radius-md);padding:10px 14px;margin-top:12px;font-size:14px}
.cost-preview strong{font-weight:600;color:var(--amber)}
.cost-perunit{font-size:12px;color:var(--text-sec)}
.cost-preview-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.cost-preview-item{flex:1;min-width:100px;background:var(--cream2);border-radius:var(--radius-md);padding:10px 14px;display:flex;flex-direction:column;gap:2px}
.cost-preview-item span{font-size:12px;color:var(--text-sec)}
.cost-preview-item strong{font-size:16px;font-weight:600;color:var(--brown-dk)}
.preview-good strong{color:var(--green)}
.preview-bad strong{color:var(--red)}

/* Buttons */
.btn-primary{height:38px;padding:0 20px;background:var(--amber);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary:hover{background:var(--brown-md)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-secondary{height:38px;padding:0 16px;background:var(--cream2);color:var(--brown-dk);border:1px solid var(--border-md);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-secondary:hover{background:var(--cream3)}
.btn-cancel{height:38px;padding:0 16px;background:transparent;color:var(--text-sec);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-cancel:hover{background:var(--cream2)}
.btn-icon{width:30px;height:30px;background:transparent;color:var(--text-hint);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:15px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.btn-icon:hover{background:var(--cream2);color:var(--brown-md)}
.btn-del:hover{background:var(--red-bg)!important;color:var(--red)!important;border-color:#e8a0a0!important}
.btn-danger{height:38px;padding:0 20px;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;font-weight:500;cursor:pointer}
.btn-danger:hover{background:#962e2e}

/* Tags & Badges */
.tag{display:inline-flex;align-items:center;gap:6px;background:var(--cream2);border:1px solid var(--border);border-radius:99px;padding:3px 10px 3px 12px;font-size:13px;color:var(--brown-dk)}
.tag-remove{background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:16px;line-height:1;padding:0;transition:color .1s}
.tag-remove:hover{color:var(--red)}
.badge{display:inline-block;font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500;font-family:'DM Mono',monospace}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:#8a5a10}
.badge-pink{background:#fbeaf0;color:#8a3055}
.badge-gray{background:var(--cream2);color:var(--text-sec)}

/* Search & List */
.list-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.count{font-size:13px;color:var(--text-hint);white-space:nowrap}
.search-wrap{position:relative;flex:1}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-hint);font-size:18px;pointer-events:none}
.search-input{padding-left:34px!important}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:18px;line-height:1;padding:0}
.search-clear:hover{color:var(--text-pri)}

/* Table */
.table-wrap{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:#fff;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:var(--cream2);padding:10px 12px;text-align:left;font-size:12px;font-weight:500;color:var(--text-sec);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-pri);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--cream)}
.td-name{font-weight:500}
.td-cost{font-weight:500;color:var(--amber);font-family:'DM Mono',monospace;font-size:13px}
.td-actions{display:flex;gap:6px;align-items:center}
.td-ings{max-width:200px}
.td-ings-detail{min-width:160px}
.ing-detail-row{display:flex;align-items:center;gap:6px;margin:2px 0}
.ing-cost{font-size:12px;color:var(--amber);font-family:'DM Mono',monospace;white-space:nowrap}
.btn-expand-ing{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-sec);padding:2px 0;white-space:nowrap;text-align:left}
.btn-expand-ing:hover{color:var(--brown-md)}
.ing-detail-panel{margin-top:6px}
.ing-chip{display:inline-block;background:var(--cream2);border-radius:4px;padding:1px 6px;font-size:12px;color:var(--text-sec);margin:1px 2px}
.ing-chip-prep{background:var(--amber-bg);color:#7a4f18}
.margin-good{color:var(--green);font-weight:500}
.margin-bad{color:var(--red);font-weight:500}

/* Empty / Loading */
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-hint)}
.empty-icon{font-size:40px;margin-bottom:8px}
.empty-state p{font-size:14px}
.loading{display:flex;align-items:center;gap:10px;padding:2rem;color:var(--text-sec);justify-content:center}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Confirm Dialog */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem}
.confirm-box{background:#fff;border-radius:var(--radius-lg);padding:1.5rem;max-width:320px;width:100%;box-shadow:var(--shadow-md)}
.confirm-box p{font-size:15px;margin-bottom:1.25rem;color:var(--text-pri)}
.confirm-box strong{color:var(--brown-dk)}
.confirm-btns{display:flex;gap:8px;justify-content:flex-end}
.hidden{display:none}

/* 原料標籤 */
.label-input-wrap{display:flex;gap:8px;margin-top:6px}
.label-input-wrap input{flex:1}
.raw-label{display:inline-flex;align-items:center;gap:4px;padding:2px 10px 2px 10px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.raw-label.selected{border-color:currentColor}
.label-colors{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.lc-0{background:#e8f0fb;color:#2563a8}.lc-1{background:#eaf3ee;color:#4a7c59}
.lc-2{background:#fef3dc;color:#8a5a10}.lc-3{background:#fbeaf0;color:#8a3055}
.lc-4{background:#f0eafd;color:#6b3fa0}.lc-5{background:#fceaea;color:#b84040}
.lc-6{background:#e0f5f0;color:#1a7a60}.lc-7{background:#fff3e0;color:#a05a10}
.td-drag{color:var(--text-hint);cursor:grab;font-size:16px;padding:10px 6px!important;user-select:none}
.td-drag:active{cursor:grabbing}
.drag-handle{display:inline-block;padding:6px 4px;touch-action:none;cursor:grab;font-size:18px}
.raw-row.dragging{opacity:.4}
.raw-row.drag-over td{background:var(--amber-bg)}

/* 標籤列 */
.label-bar{margin-top:12px}
.label-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.raw-all-labels{display:flex;flex-wrap:wrap;gap:6px}
.label-toggle{cursor:pointer;opacity:.55;transition:all .15s;border:1.5px solid transparent}
.label-toggle:hover{opacity:.85}
.label-toggle.label-on{opacity:1;border-color:currentColor;font-weight:500}
.no-label-hint{font-size:13px;color:var(--text-hint)}
.btn-edit-labels{height:30px;padding:0 12px;background:transparent;color:var(--brown-md);border:1px solid var(--border-md);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-edit-labels:hover{background:var(--cream2)}

/* 標籤編輯器 Modal */
.label-editor-box{background:#fff;border-radius:var(--radius-lg);padding:1.25rem;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.label-editor-header{margin-bottom:1rem}
.label-editor-section{margin-bottom:1rem}
.label-editor-section-title{font-size:12px;font-weight:500;color:var(--text-sec);margin-bottom:6px}
.le-presets{display:flex;flex-wrap:wrap;gap:6px}
.le-preset-btn{padding:4px 12px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;background:var(--cream2);color:var(--brown-dk);border-color:var(--border)}
.le-preset-btn:hover{border-color:var(--brown-md)}
.le-preset-btn.active{border-color:currentColor;opacity:1}
.le-empty{font-size:13px;color:var(--text-hint);padding:8px 0}

/* 標籤編輯器列表 */
.le-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.le-item:last-child{border-bottom:none}
.le-drag{color:var(--text-hint);cursor:grab;font-size:16px;flex-shrink:0;user-select:none;padding:0 2px}
.le-drag:active{cursor:grabbing}
.le-item.dragging{opacity:.35;background:var(--cream2);border-radius:var(--radius-sm)}
.le-chip{flex-shrink:0}
.le-name-input{flex:1;height:32px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 8px;font-size:13px;font-family:inherit;color:var(--text-pri);background:#fff}
.le-name-input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,135,42,.15)}
.le-del-btn{width:28px;height:28px;background:transparent;color:var(--text-hint);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.le-del-btn:hover{background:var(--red-bg);color:var(--red);border-color:#e8a0a0}
.td-time{font-size:12px;color:var(--text-hint);white-space:nowrap}
.raw-filter-labels{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.filter-label{cursor:pointer;opacity:.6;transition:opacity .15s}
.filter-label.on{opacity:1}

/* Responsive */
@media(max-width:680px){
  .logo-text{font-size:14px}
  .nav-btn{padding:5px 10px;font-size:13px}
  .nav-label{display:none}
  .nav-icon{font-size:20px}
  .g-raw{grid-template-columns:1fr 1fr}
  .g-raw>*:first-child{grid-column:span 2}
  .g-raw>.form-actions{grid-column:span 2}
  .g-prep,.g-fin{grid-template-columns:1fr 1fr}
  .g-fin>*:first-child{grid-column:span 2}
  .ing-section-grid{grid-template-columns:1fr}
  table{font-size:13px}
  th,td{padding:8px 8px}
  .td-ings{max-width:120px}
  .cost-preview-row{flex-direction:column}
}
@media(max-width:420px){
  .main{padding:1rem .75rem 2rem}
  .form-card{padding:1rem}
  .g-raw,.g-prep,.g-fin{grid-template-columns:1fr}
  .g-raw>*:first-child,.g-fin>*:first-child{grid-column:auto}
  .g-raw>.form-actions{grid-column:auto}
  .ing-add-row{flex-wrap:wrap}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">🥐</span>
      <span class="logo-text">烘焙成本計算</span>
    </div>
    <nav class="nav">
      <button class="nav-btn active" onclick="showPage('raw',this)">
        <span class="nav-icon">🌾</span><span class="nav-label">原料食材</span>
      </button>
      <button class="nav-btn" onclick="showPage('prep',this)">
        <span class="nav-icon">🥣</span><span class="nav-label">備料食材</span>
      </button>
      <button class="nav-btn" onclick="showPage('finished',this)">
        <span class="nav-icon">🍞</span><span class="nav-label">成品成本</span>
      </button>
    </nav>
  </div>
</header>

<main class="main">

  <!-- ===== PAGE: 原料食材 ===== -->
  <div id="page-raw" class="page active">
    <div class="raw-sticky">
      <div class="page-header">
        <div class="page-header-row">
          <div>
            <h2>原料食材</h2>
            <p class="page-desc">記錄每種原料的進貨量與價格，系統自動計算單位成本</p>
          </div>
          <button class="btn-toggle-form" id="raw-form-toggle" onclick="toggleRawForm()">
            <span id="raw-form-toggle-icon">＋</span> 新增原料
          </button>
        </div>
      </div>
      <div class="form-card form-collapsible" id="raw-form-card">
        <div class="form-grid g-raw">
          <div class="field" id="f-raw-name-wrap">
            <label>原料品名</label>
            <input id="f-raw-name" placeholder="例：高筋麵粉">
            <span class="err-msg hidden" id="e-raw-name"></span>
          </div>
          <div class="field" id="f-raw-qty-wrap">
            <label>進貨量</label>
            <input id="f-raw-qty" type="number" placeholder="25" min="0">
            <span class="err-msg hidden" id="e-raw-qty"></span>
          </div>
          <div class="field">
            <label>單位</label>
            <select id="f-raw-unit">
              <option>kg</option><option>g</option><option>cc</option><option>斤</option><option>個</option>
            </select>
          </div>
          <div class="field" id="f-raw-price-wrap">
            <label>進貨價格 (NT$)</label>
            <input id="f-raw-price" type="number" placeholder="450" min="0">
            <span class="err-msg hidden" id="e-raw-price"></span>
          </div>
          <div class="field form-actions">
            <button class="btn-primary" id="raw-submit-btn" onclick="submitRaw()">新增</button>
            <button class="btn-cancel" id="raw-cancel-btn" onclick="cancelRaw()">取消</button>
          </div>
        </div>
        <div class="label-bar">
          <div class="label-bar-top">
            <span class="form-section-title" style="margin:0">標籤</span>
            <button class="btn-edit-labels" onclick="openLabelEditor()">✎ 編輯標籤</button>
          </div>
          <div id="raw-all-labels" class="raw-all-labels"></div>
          <div id="raw-no-label" class="no-label-hint hidden">尚無標籤，請點「編輯標籤」新增</div>
        </div>
      </div><!-- end form-card -->
    </div><!-- end raw-sticky -->
    <div class="list-header">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="raw-search" placeholder="搜尋原料品名..." oninput="renderRaw()">
        <button class="search-clear hidden" id="raw-search-clear" onclick="clearSearch('raw-search','raw-search-clear');renderRaw()">×</button>
      </div>
      <span class="count" id="raw-count"></span>
    </div>
    <div class="raw-filter-labels" id="raw-filter-labels"></div>
    <div id="raw-list"></div>
  </div>

  <!-- ===== PAGE: 備料食材 ===== -->
  <div id="page-prep" class="page">
    <div class="page-header">
      <div class="page-header-row">
        <div>
          <h2>備料食材</h2>
          <p class="page-desc">記錄麵糰、餡料等備料的成分組成，計算每克成本</p>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'
import {
  getFirestore, collection, onSnapshot, addDoc, updateDoc,
  deleteDoc, doc, serverTimestamp, query, orderBy, getDoc, setDoc
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'

const firebaseConfig = {
  apiKey: "AIzaSyBdohEN4PBAj3-Wcmsae4pwZNUrCyuQw04",
  authDomain: "bakery-cost.firebaseapp.com",
  projectId: "bakery-cost",
  storageBucket: "bakery-cost.firebasestorage.app",
  messagingSenderId: "32199948544",
  appId: "1:32199948544:web:65776afccbd4b30a045be5"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

// ===== State =====
window._raw = []
window._prep = []
window._fin = []
window._prepIngs = []
window._finIngs = []
window._editRawId = null
window._editPrepId = null
window._editFinId = null
window._confirmCb = null
window._rawSelectedLabels = []   // 表單暫存標籤
window._rawFilterLabel = null    // 列表篩選標籤
window._rawDragId = null         // 拖曳排序暫存

// 預設標籤
const PRESET_LABELS = [
  {name:'粉類',color:0},{name:'糖＆鹽',color:2},{name:'油脂',color:3},
  {name:'乳製品',color:1},{name:'蛋',color:7},{name:'酵母',color:4},
  {name:'堅果',color:6}
]

// ===== 標籤系統 =====
// _allLabels 從 Firestore settings/labels 讀取，永久保存
// _rawSelectedLabels = 目前這筆原料已選的標籤名稱（字串陣列）
window._rawSelectedLabels = []

const LABEL_COLORS = [0,1,2,3,4,5,6,7]
const DEFAULT_LABELS = [
  {name:'粉類',color:0},{name:'糖＆鹽',color:2},{name:'油脂',color:3},
  {name:'乳製品',color:1},{name:'蛋',color:7},{name:'酵母',color:4},
  {name:'堅果',color:6}
]

let _allLabels = []
let _labelsLoaded = false

// 從 Firestore 載入標籤庫
async function loadLabels(){
  try {
    const ref = doc(db, 'settings', 'labels')
    const snap = await getDoc(ref)
    if(snap.exists() && snap.data().list?.length){
      _allLabels = snap.data().list
    } else {
      _allLabels = [...DEFAULT_LABELS]
      await setDoc(ref, {list: _allLabels})
    }
  } catch(e) {
    _allLabels = [...DEFAULT_LABELS]
  }
  _labelsLoaded = true
  renderSelectedLabels()
}

// 儲存標籤庫到 Firestore
async function saveLabelsToFirestore(){
  try {
    await setDoc(doc(db,'settings','labels'), {list: _allLabels})
  } catch(e){ console.error('儲存標籤失敗',e) }
}

loadLabels()

// 外層標籤列：顯示所有標籤，已選的高亮，點一下切換選取
function renderSelectedLabels(){
  const allEl=document.getElementById('raw-all-labels')
  const hint=document.getElementById('raw-no-label')
  if(!_allLabels.length){
    allEl.innerHTML=''
    hint.classList.remove('hidden')
    return
  }
  hint.classList.add('hidden')
  allEl.innerHTML=_allLabels.map(l=>{
    const isOn=window._rawSelectedLabels.includes(l.name)
    return `<span class="raw-label lc-${l.color} label-toggle ${isOn?'label-on':''}"
      onclick="toggleLabel('${l.name.replace(/'/g,"\\'")}')">
      ${l.name}${isOn?' ✓':''}
    </span>`
  }).join('')
}

window.toggleLabel=(name)=>{
  const idx=window._rawSelectedLabels.indexOf(name)
  if(idx>=0) window._rawSelectedLabels.splice(idx,1)
  else window._rawSelectedLabels.push(name)
  renderSelectedLabels()
}

// ===== 標籤編輯器 Modal =====
let _leLabels=[]
let _leDragIdx=null

window.openLabelEditor=()=>{
  _leLabels=_allLabels.map(l=>({...l}))
  renderLePresetList()
  document.getElementById('le-new-input').value=''
  document.getElementById('label-editor-overlay').classList.remove('hidden')
}

window.closeLabelEditor=()=>{
  document.getElementById('label-editor-overlay').classList.add('hidden')
}

window.saveLabelEditor=async()=>{
  // 先收集改名對照表
  const renameMap={}  // { oldName: newName }
  document.querySelectorAll('#le-preset-list .le-name-input').forEach(inp=>{
    const i=parseInt(inp.dataset.idx)
    if(_leLabels[i]!==undefined){
      const newName=inp.value.trim()
      if(newName){
        const oldName=_leLabels[i].name
        if(oldName!==newName) renameMap[oldName]=newName
        _leLabels[i].name=newName
      }
    }
  })

  // 同步表單已選標籤
  window._rawSelectedLabels=window._rawSelectedLabels
    .map(n=>renameMap[n]||n)
    .filter(n=>_leLabels.some(l=>l.name===n))

  _allLabels=[..._leLabels]
  await saveLabelsToFirestore()

  // 同步更新所有已儲存原料的標籤名稱
  if(Object.keys(renameMap).length>0){
    const affected=window._raw.filter(r=>
      (r.labels||[]).some(l=>{
        const name=typeof l==='string'?l:l.name
        return renameMap[name]!==undefined
      })
    )
    if(affected.length>0){
      const updates=affected.map(r=>{
        const newLabels=(r.labels||[]).map(l=>{
          const name=typeof l==='string'?l:l.name
          return renameMap[name]||name
        })
        return updateDoc(doc(db,'rawIngredients',r.id),{labels:newLabels})
      })
      await Promise.all(updates)
    }
  }

  renderSelectedLabels()
  closeLabelEditor()
}

function renderLePresetList(){
  const el=document.getElementById('le-preset-list')
  if(!_leLabels.length){
    el.innerHTML=`<div class="le-empty">尚無標籤，請在下方新增</div>`
    return
  }
  el.innerHTML=_leLabels.map((l,i)=>`
    <div class="le-item" draggable="true"
      ondragstart="leDragStart(event,${i})"
      ondragover="leDragOver(event)"
      ondrop="leDrop(event,${i})"
      ondragend="leDragEnd()"
      ontouchstart="leTouchStart(event,${i})"
      ontouchmove="leTouchMove(event)"
      ontouchend="leTouchEnd(event,${i})">
      <span class="le-drag">⠿</span>
      <span class="raw-label lc-${l.color} le-chip">${l.name}</span>
      <input class="le-name-input" data-idx="${i}" value="${l.name}"
        oninput="leUpdateName(${i},this.value)">
      <button class="le-del-btn" onclick="leDelete(${i})">×</button>
    </div>`).join('')
}

window.leUpdateName=(i,val)=>{
  _leLabels[i]._pendingName=val
  const chips=document.querySelectorAll('#le-preset-list .le-chip')
  if(chips[i]) chips[i].textContent=val||'…'
}

function syncLeInputs(){
  document.querySelectorAll('#le-preset-list .le-name-input').forEach(inp=>{
    const i=parseInt(inp.dataset.idx)
    if(_leLabels[i]!==undefined) _leLabels[i].name=inp.value.trim()||_leLabels[i].name
  })
}

window.leDelete=(i)=>{
  syncLeInputs()
  _leLabels.splice(i,1)
  renderLePresetList()
}

window.leAddNew=()=>{
  const inp=document.getElementById('le-new-input')
  const name=inp.value.trim()
  if(!name) return
  if(_leLabels.find(l=>l.name===name)) return
  const usedColors=_leLabels.map(l=>l.color)
  const color=LABEL_COLORS.find(c=>!usedColors.includes(c))??(_leLabels.length%8)
  syncLeInputs()
  _leLabels.push({name,color})
  inp.value=''
  renderLePresetList()
}
document.getElementById('le-new-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();leAddNew()}
})

// 拖曳（桌機）
window.leDragStart=(e,i)=>{ syncLeInputs(); _leDragIdx=i; setTimeout(()=>e.target.classList.add('dragging'),0) }
window.leDragOver=(e)=>e.preventDefault()
window.leDragEnd=()=>document.querySelectorAll('.le-item').forEach(el=>el.classList.remove('dragging'))
window.leDrop=(e,toIdx)=>{
  e.preventDefault()
  if(_leDragIdx===null||_leDragIdx===toIdx) return
  const [moved]=_leLabels.splice(_leDragIdx,1)
  _leLabels.splice(toIdx,0,moved)
  _leDragIdx=null
  renderLePresetList()
}

// 拖曳（手機 touch）
let _leTouchIdx=null, _leTouchClone=null, _leTouchOffY=0
window.leTouchStart=(e,i)=>{
  e.stopPropagation()
  syncLeInputs()
  _leTouchIdx=i
  const row=e.target.closest('.le-item')
  const rect=row.getBoundingClientRect()
  _leTouchOffY=e.touches[0].clientY-rect.top
  _leTouchClone=row.cloneNode(true)
  _leTouchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.85;background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);border-radius:6px;z-index:9999;pointer-events:none;`
  document.body.appendChild(_leTouchClone)
  row.style.opacity='.3'
}
window.leTouchMove=(e)=>{
  if(!_leTouchClone) return
  e.preventDefault()
  const t=e.touches[0]
  _leTouchClone.style.top=(t.clientY-_leTouchOffY)+'px'
  _leTouchClone.style.display='none'
  const under=document.elementFromPoint(t.clientX,t.clientY)
  _leTouchClone.style.display=''
  document.querySelectorAll('.le-item').forEach(el=>el.classList.remove('drag-over'))
  const targetItem=under?.closest('.le-item')
  if(targetItem) targetItem.classList.add('drag-over')
}
window.leTouchEnd=(e,fromIdx)=>{
  if(_leTouchClone){ _leTouchClone.remove(); _leTouchClone=null }
  document.querySelectorAll('.le-item').forEach(el=>{ el.style.opacity=''; el.classList.remove('drag-over') })
  const t=e.changedTouches[0]
  const under=document.elementFromPoint(t.clientX,t.clientY)
  const targetItem=under?.closest('.le-item[draggable]')
  if(targetItem){
    const items=[...document.querySelectorAll('.le-item')]
    const toIdx=items.indexOf(targetItem)
    if(toIdx>=0&&toIdx!==fromIdx){
      const [moved]=_leLabels.splice(fromIdx,1)
      _leLabels.splice(toIdx,0,moved)
      renderLePresetList()
    }
  }
  _leTouchIdx=null
}

// ===== 備料/成品 標籤系統（共用工廠） =====
function createLabelSystem({
  storageKey, allLabelsId, noLabelId, filterLabelsId,
  filterLabelStateKey, selectedLabelStateKey,
  editorOverlayId, leListId, leNewInputId,
  renderList, submitSave, collectionName
}){
  let _allLabels=[]
  let _leLabels=[], _leDragIdx=null, _leTouchIdx=null, _leTouchClone=null, _leTouchOffY=0

  async function loadLabels(){
    try{
      const snap=await getDoc(doc(db,'settings',storageKey))
      _allLabels=snap.exists()&&snap.data().list?.length ? snap.data().list : []
    }catch(e){ _allLabels=[] }
    renderSelectedLabels()
  }
  async function saveToFirestore(){
    try{ await setDoc(doc(db,'settings',storageKey),{list:_allLabels}) }catch(e){}
  }

  function renderSelectedLabels(){
    const allEl=document.getElementById(allLabelsId)
    const hint=document.getElementById(noLabelId)
    if(!_allLabels.length){ allEl.innerHTML=''; hint.classList.remove('hidden'); return }
    hint.classList.add('hidden')
    const sel=window[selectedLabelStateKey]||[]
    allEl.innerHTML=_allLabels.map(l=>{
      const isOn=sel.includes(l.name)
      return `<span class="raw-label lc-${l.color} label-toggle ${isOn?'label-on':''}"
        onclick="window.__ls_${storageKey}_toggle('${l.name.replace(/'/g,"\\'")}')">
        ${l.name}${isOn?' ✓':''}
      </span>`
    }).join('')
  }

  function renderFilterLabels(){
    const names=new Set()
    const dataList=collectionName==='prepItems'?window._prep:window._fin
    dataList.forEach(item=>(item.labels||[]).forEach(l=>names.add(typeof l==='string'?l:l.name)))
    const el=document.getElementById(filterLabelsId)
    if(!names.size){ el.innerHTML=''; return }
    const cur=window[filterLabelStateKey]
    el.innerHTML=`<span class="raw-label lc-6 filter-label ${cur===null?'on':''}"
      onclick="window.__ls_${storageKey}_setFilter(null)">全部</span>`
      +[...names].map(name=>{
        const meta=_allLabels.find(x=>x.name===name)
        const color=meta?meta.color:0
        return `<span class="raw-label lc-${color} filter-label ${cur===name?'on':''}"
          onclick="window.__ls_${storageKey}_setFilter('${name.replace(/'/g,"\\'")}')">
          ${name}</span>`
      }).join('')
  }

  function renderLeList(){
    const el=document.getElementById(leListId)
    if(!_leLabels.length){ el.innerHTML=`<div class="le-empty">尚無標籤，請在下方新增</div>`; return }
    el.innerHTML=_leLabels.map((l,i)=>`
      <div class="le-item" draggable="true"
        ondragstart="window.__ls_${storageKey}_leDrag(${i})"
        ondragover="event.preventDefault()"
        ondrop="window.__ls_${storageKey}_leDrop(event,${i})"
        ondragend="document.querySelectorAll('.le-item').forEach(e=>e.classList.remove('dragging'))"
        ontouchstart="window.__ls_${storageKey}_leTouch(event,${i})"
        ontouchmove="window.__ls_${storageKey}_leTouchMove(event)"
        ontouchend="window.__ls_${storageKey}_leTouchEnd(event,${i})">
        <span class="le-drag">⠿</span>
        <span class="raw-label lc-${l.color} le-chip">${l.name}</span>
        <input class="le-name-input" data-idx="${i}" value="${l.name}"
          oninput="window.__ls_${storageKey}_leUpdate(${i},this.value)">
        <button class="le-del-btn" onclick="window.__ls_${storageKey}_leDel(${i})">×</button>
      </div>`).join('')
  }

  function syncInputs(){
    document.querySelectorAll(`#${leListId} .le-name-input`).forEach(inp=>{
      const i=parseInt(inp.dataset.idx)
      if(_leLabels[i]) _leLabels[i].name=inp.value.trim()||_leLabels[i].name
    })
  }

  // 暴露到 window
  window[`__ls_${storageKey}_toggle`]=(name)=>{
    const arr=window[selectedLabelStateKey]||[]
    const idx=arr.indexOf(name)
    if(idx>=0) arr.splice(idx,1); else arr.push(name)
    window[selectedLabelStateKey]=arr
    renderSelectedLabels()
  }
  window[`__ls_${storageKey}_setFilter`]=(name)=>{
    window[filterLabelStateKey]=name
    renderFilterLabels()
    renderList()
  }
  window[`__ls_${storageKey}_leUpdate`]=(i,val)=>{
    _leLabels[i].name=val
    const chips=document.querySelectorAll(`#${leListId} .le-chip`)
    if(chips[i]) chips[i].textContent=val||'…'
  }
  window[`__ls_${storageKey}_leDel`]=(i)=>{ syncInputs(); _leLabels.splice(i,1); renderLeList() }
  window[`__ls_${storageKey}_leDrag`]=(i)=>{ syncInputs(); _leDragIdx=i; setTimeout(()=>document.querySelectorAll('.le-item')[i]?.classList.add('dragging'),0) }
  window[`__ls_${storageKey}_leDrop`]=(e,toIdx)=>{
    e.preventDefault()
    if(_leDragIdx===null||_leDragIdx===toIdx) return
    const [moved]=_leLabels.splice(_leDragIdx,1); _leLabels.splice(toIdx,0,moved); _leDragIdx=null; renderLeList()
  }
  window[`__ls_${storageKey}_leTouch`]=(e,i)=>{
    e.stopPropagation(); syncInputs(); _leTouchIdx=i
    const row=e.target.closest('.le-item'); const rect=row.getBoundingClientRect(); _leTouchOffY=e.touches[0].clientY-rect.top
    _leTouchClone=row.cloneNode(true)
    _leTouchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.85;background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);border-radius:6px;z-index:9999;pointer-events:none;`
    document.body.appendChild(_leTouchClone); row.style.opacity='.3'
  }
  window[`__ls_${storageKey}_leTouchMove`]=(e)=>{
    if(!_leTouchClone) return; e.preventDefault()
    const t=e.touches[0]; _leTouchClone.style.top=(t.clientY-_leTouchOffY)+'px'
    _leTouchClone.style.display='none'; const under=document.elementFromPoint(t.clientX,t.clientY); _leTouchClone.style.display=''
    document.querySelectorAll('.le-item').forEach(el=>el.classList.remove('drag-over'))
    under?.closest('.le-item')?.classList.add('drag-over')
  }
  window[`__ls_${storageKey}_leTouchEnd`]=(e,fromIdx)=>{
    if(_leTouchClone){ _leTouchClone.remove(); _leTouchClone=null }
    document.querySelectorAll('.le-item').forEach(el=>{ el.style.opacity=''; el.classList.remove('drag-over') })
    const under=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY)
    const targetItem=under?.closest('.le-item[draggable]')
    if(targetItem){
      const items=[...document.querySelectorAll('.le-item')]
      const toIdx=items.indexOf(targetItem)
      if(toIdx>=0&&toIdx!==fromIdx){ const [m]=_leLabels.splice(fromIdx,1); _leLabels.splice(toIdx,0,m); renderLeList() }
    }
    _leTouchIdx=null
  }

  return {
    openEditor: ()=>{
      _leLabels=_allLabels.map(l=>({...l}))
      renderLeList()
      document.getElementById(leNewInputId).value=''
      document.getElementById(editorOverlayId).classList.remove('hidden')
    },
    closeEditor: ()=>document.getElementById(editorOverlayId).classList.add('hidden'),
    saveEditor: async()=>{
      syncInputs()
      // 改名對照
      const renameMap={}
      _allLabels.forEach((old,i)=>{ if(_leLabels[i]&&old.name!==_leLabels[i].name) renameMap[old.name]=_leLabels[i].name })
      // 同步已選
      window[selectedLabelStateKey]=(window[selectedLabelStateKey]||[]).map(n=>renameMap[n]||n).filter(n=>_leLabels.some(l=>l.name===n))
      _allLabels=[..._leLabels]
      await saveToFirestore()
      // 更新 Firestore 中的項目標籤
      if(Object.keys(renameMap).length){
        const dataList=collectionName==='prepItems'?window._prep:window._fin
        const affected=dataList.filter(item=>(item.labels||[]).some(l=>renameMap[typeof l==='string'?l:l.name]))
        await Promise.all(affected.map(item=>{
          const newLabels=(item.labels||[]).map(l=>{ const n=typeof l==='string'?l:l.name; return renameMap[n]||n })
          return updateDoc(doc(db,collectionName,item.id),{labels:newLabels})
        }))
      }
      renderSelectedLabels(); renderFilterLabels()
      document.getElementById(editorOverlayId).classList.add('hidden')
    },
    addNew: ()=>{
      const inp=document.getElementById(leNewInputId)
      const name=inp.value.trim()
      if(!name||_leLabels.find(l=>l.name===name)) return
      const usedColors=_leLabels.map(l=>l.color)
      const color=LABEL_COLORS.find(c=>!usedColors.includes(c))??(_leLabels.length%8)
      syncInputs(); _leLabels.push({name,color}); inp.value=''; renderLeList()
    },
    getSelectedLabels: ()=>window[selectedLabelStateKey]||[],
    clearSelected: ()=>{ window[selectedLabelStateKey]=[]; renderSelectedLabels() },
    restoreSelected: (labels)=>{ window[selectedLabelStateKey]=labels; renderSelectedLabels() },
    getAllLabels: ()=>_allLabels,
    renderFilter: renderFilterLabels,
    renderSelected: renderSelectedLabels,
    load: ()=>loadLabels()
  }
}

onSnapshot(qRaw, snap => {
  let docs=snap.docs.map(d=>({id:d.id,...d.data()}))
  // 有 sortOrder 的照 sortOrder 排，沒有的照 createdAt 排在後面
  docs.sort((a,b)=>{
    const ha=a.sortOrder!=null, hb=b.sortOrder!=null
    if(ha&&hb) return a.sortOrder-b.sortOrder
    if(ha) return -1
    if(hb) return 1
    // 兩個都沒有 sortOrder，用 createdAt
    const ta=a.createdAt?.toMillis?.()||0
    const tb=b.createdAt?.toMillis?.()||0
    return ta-tb
  })
  window._raw=docs
  renderRaw(); renderFilterLabels(); updateSelects()
})
onSnapshot(qPrep, snap => {
  let docs=snap.docs.map(d=>({id:d.id,...d.data()}))
  docs.sort((a,b)=>{
    const ha=a.sortOrder!=null, hb=b.sortOrder!=null
    if(ha&&hb) return a.sortOrder-b.sortOrder
    if(ha) return -1; if(hb) return 1
    return (a.createdAt?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||0)
  })
  window._prep=docs; renderPrep(); updateSelects()
})
onSnapshot(qFin, snap => {
  let docs=snap.docs.map(d=>({id:d.id,...d.data()}))
  docs.sort((a,b)=>{
    const ha=a.sortOrder!=null, hb=b.sortOrder!=null
    if(ha&&hb) return a.sortOrder-b.sortOrder
    if(ha) return -1; if(hb) return 1
    return (a.createdAt?.toMillis?.()||0)-(b.createdAt?.toMillis?.()||0)
  })
  window._fin=docs; renderFin()
})

// ===== Calc =====
function unitCostPerG(raw){
  const {qty,unit,price}=raw
  if(!qty||!price)return 0
  if(unit==='kg') return price/(qty*1000)
  if(unit==='斤') return price/(qty*600)
  if(unit==='個') return price/qty
  return price/qty
}
function calcPrepCost(ings){
  return (ings||[]).reduce((s,i)=>{
    const r=window._raw.find(x=>x.id===i.rawId)
    return r ? s+unitCostPerG(r)*i.amount : s
  },0)
}
function calcPrepCostPerG(prep){
  const cost=calcPrepCost(prep.ingredients)
  return prep.totalWeight>0 ? cost/prep.totalWeight : 0
}
function calcFinCost(ings){
  return (ings||[]).reduce((s,i)=>{
    if(i.type==='raw'){
      const r=window._raw.find(x=>x.id===i.refId)
      return r ? s+unitCostPerG(r)*i.amount : s
    }
    if(i.type==='prep'){
      const p=window._prep.find(x=>x.id===i.refId)
      return p ? s+calcPrepCostPerG(p)*i.amount : s
    }
    return s
  },0)
}

let _touchClone=null
let _touchOffsetY=0

window.onRawTouchStart=(e,id)=>{
  e.preventDefault()
  _touchDragId=id
  const touch=e.touches[0]
  const row=e.target.closest('tr')
  const rect=row.getBoundingClientRect()
  _touchOffsetY=touch.clientY-rect.top

  // 建立視覺跟隨的 clone
  _touchClone=row.cloneNode(true)
  _touchClone.style.cssText=`position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.85;background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.2);border-radius:6px;z-index:9999;pointer-events:none;`
  document.body.appendChild(_touchClone)
  row.style.opacity='.3'
}

window.onRawTouchMove=(e)=>{
  if(!_touchDragId||!_touchClone)return
  e.preventDefault()
  const touch=e.touches[0]
  _touchClone.style.top=(touch.clientY-_touchOffsetY)+'px'

  // 找出目前 touch 位置下方的 row
  _touchClone.style.display='none'
  const el=document.elementFromPoint(touch.clientX, touch.clientY)
  _touchClone.style.display=''
  const targetRow=el?.closest('tr[data-id]')
  document.querySelectorAll('.raw-row').forEach(r=>r.classList.remove('drag-over'))
  if(targetRow&&targetRow.dataset.id!==_touchDragId) targetRow.classList.add('drag-over')
}

window.onRawTouchEnd=async(e)=>{
  if(!_touchDragId)return
  const touch=e.changedTouches[0]

  // 清除 clone
  if(_touchClone){ _touchClone.remove(); _touchClone=null }
  document.querySelectorAll('.raw-row').forEach(r=>{
    r.style.opacity=''; r.classList.remove('drag-over')
  })

  // 找目標 row
  const el=document.elementFromPoint(touch.clientX, touch.clientY)
  const targetRow=el?.closest('tr[data-id]')
  const targetId=targetRow?.dataset.id
  if(targetId&&targetId!==_touchDragId){
    await saveRawOrder(_touchDragId, targetId)
  }
  _touchDragId=null
}

// 共用：重新排序並寫入 Firebase
async function saveRawOrder(fromId, toId){
  const fromIdx=window._raw.findIndex(r=>r.id===fromId)
  const toIdx=window._raw.findIndex(r=>r.id===toId)
  if(fromIdx<0||toIdx<0)return
  const reordered=[...window._raw]
  const [moved]=reordered.splice(fromIdx,1)
  reordered.splice(toIdx,0,moved)
  const updates=reordered.map((r,i)=>updateDoc(doc(db,'rawIngredients',r.id),{sortOrder:i}))
  await Promise.all(updates)
}

async function saveSortOrder(fromId, toId, list, collectionName){
  const fromIdx=list.findIndex(r=>r.id===fromId)
  const toIdx=list.findIndex(r=>r.id===toId)
  if(fromIdx<0||toIdx<0)return
  const reordered=[...list]
  const [moved]=reordered.splice(fromIdx,1)
  reordered.splice(toIdx,0,moved)
  await Promise.all(reordered.map((r,i)=>updateDoc(doc(db,collectionName,r.id),{sortOrder:i})))
}

let _sortDragId=null, _sortTouchId=null, _sortTouchClone=null, _sortTouchOffY=0

window.onSortDragStart=(e,id,type)=>{

window.onSortTouchStart=(e,id,type)=>{
  e.preventDefault()

  e.preventDefault()

  _sortTouchClone.style.display=''
  document.querySelectorAll('.sort-row').forEach(r=>r.classList.remove('drag-over'))
  const targetRow=under?.closest('tr[data-id]')

window.onSortTouchEnd=async(e,type)=>{

  const touch=e.changedTouches[0]
  if(_sortTouchClone){ _sortTouchClone.remove(); _sortTouchClone=null }
  document.querySelectorAll('.sort-row').forEach(r=>{ r.style.opacity=''; r.classList.remove('drag-over') })

function clearFinForm(){
  document.getElementById('f-fin-name').value=''
  document.getElementById('f-fin-price').value=''
  document.getElementById('f-fin-qty').value=1
  document.getElementById('f-fin-margin').value=60
  window._finIngs=[]
  renderFinTags()
  document.getElementById('fin-preview-row').classList.add('hidden')
  finLS.clearSelected()
  _toggleForm('fin-form-card','fin-form-toggle','fin-form-toggle-icon','新增成品',_finFormOpen)
  document.getElementById('fin-submit-btn').textContent='新增'
}
window.delFin=async(id)=>{ await deleteDoc(doc(db,'finishedProducts',id)) }

// ===== Error helpers =====
function showErr(wrapId,msgId,msg){
  document.getElementById(wrapId).classList.add('err')
  const el=document.getElementById(msgId)
  el.textContent=msg; el.classList.remove('hidden')
}
function hideErr(wrapId,msgId){
  document.getElementById(wrapId).classList.remove('err')
  document.getElementById(msgId).classList.add('hidden')
}

</script>
